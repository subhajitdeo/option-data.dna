name: LTP Calculator - Process Every 3 Minutes

on:
  schedule:
    - cron: '*/3 * * * *'   # Runs every 3 minutes
  workflow_dispatch:          # Allows manual trigger

jobs:
  process-ltp-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      
      - name: Run LTP Calculation
        run: deno run --allow-net --allow-read --allow-write --allow-env calc.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ltp_results.json
          git commit -m "Auto-update LTP results [skip ci]" || echo "No changes to commit"
          git push
