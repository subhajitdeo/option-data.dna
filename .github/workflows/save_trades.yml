name: Save Trades to GitHub

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  save-trades:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install requests
        run: pip install requests
      
      - name: Run trade saver
        run: python scripts/save_trades.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/trades_history.json
          git add scripts/
          git diff --staged --quiet || git commit -m "Update trade history - $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push || echo "No changes to push"
