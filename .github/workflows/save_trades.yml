name: Save Trades to GitHub

on:
  schedule:
 #(stoped)   - cron: '*/5 3-10 * * 1-5'   # Every 5 min, Mon-Fri, 3:00-10:59 UTC
  workflow_dispatch:

jobs:
  save-trades:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install requests
        run: pip install requests
      
      - name: Run trade saver
        run: python scripts/save_trades.py
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/trades_history.json
          git diff --staged --quiet || git commit -m "Update trades - $(date -u '+%Y-%m-%d %H:%M:%S')"
          git pull origin main --rebase --strategy-option=theirs || true
          git push origin main --force-with-lease || true
