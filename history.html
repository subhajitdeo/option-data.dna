<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade History | Nifty50 Signals</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a0f1c 0%, #0f1625 100%);
            font-family: 'Inter', monospace;
            padding: 20px;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            flex-wrap: wrap;
            gap: 16px;
        }
        h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #c0e0ff, #7c9bff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .refresh-btn {
            background: rgba(56, 189, 248, 0.2);
            border: 1px solid #38bdf8;
            color: #38bdf8;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
        }
        .refresh-btn:hover {
            background: rgba(56, 189, 248, 0.4);
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(15, 25, 45, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 15px 25px;
            border: 1px solid rgba(56, 189, 248, 0.15);
        }
        .stat-label {
            font-size: 0.7rem;
            color: #7f8ea3;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .table-container {
            background: rgba(15, 25, 45, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }
        th {
            color: #7f8ea3;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .buy-ce { color: #2ecc71; font-weight: bold; }
        .buy-pe { color: #e74c3c; font-weight: bold; }
        .wait { color: #f39c12; }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #5a6a8a;
        }
        .last-update {
            font-size: 0.7rem;
            color: #5a6a8a;
            text-align: right;
            margin-top: 10px;
        }
        @media (max-width: 768px) {
            body { padding: 12px; }
            th, td { padding: 6px 4px; font-size: 0.6rem; }
            .stat-value { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 TRADE HISTORY</h1>
        <button class="refresh-btn" onclick="loadHistory()">🔄 Refresh</button>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-label">Total Trades</div><div class="stat-value" id="totalTrades">---</div></div>
        <div class="stat-card"><div class="stat-label">Buy CE</div><div class="stat-value" id="buyCeCount">---</div></div>
        <div class="stat-card"><div class="stat-label">Buy PE</div><div class="stat-value" id="buyPeCount">---</div></div>
        <div class="stat-card"><div class="stat-label">Last Signal</div><div class="stat-value" id="lastSignal">---</div></div>
    </div>

    <div class="table-container">
        <table id="tradeTable">
            <thead>
                <tr>
                    <th>Date/Time</th>
                    <th>Spot</th>
                    <th>Action</th>
                    <th>Scenario</th>
                    <th>Bias</th>
                    <th>Entry</th>
                    <th>Target</th>
                    <th>Stop Loss</th>
                </tr>
            </thead>
            <tbody id="tradeTableBody">
                <tr><td colspan="8">Loading trade history...</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            </tbody>
        </table>
    </div>
    <div id="lastUpdate" class="last-update"></div>
    <div class="footer">
        ⏱️ Auto-saved by GitHub Action every 5 minutes | Data stored in <code>data/trades_history.json</code>
    </div>
</div>

<script>
    const HISTORY_URL = 'https://raw.githubusercontent.com/subhajitdeo/option-data.dna/main/data/trades_history.json';
    
    async function loadHistory() {
        try {
            const response = await fetch(`${HISTORY_URL}?t=${Date.now()}`);
            if (!response.ok) throw new Error('No trades yet');
            const trades = await response.json();
            
            // Update stats
            const total = trades.length;
            const buyCe = trades.filter(t => t.action === 'BUY CE').length;
            const buyPe = trades.filter(t => t.action === 'BUY PE').length;
            const lastSignal = trades.length > 0 ? trades[0].action : '---';
            
            document.getElementById('totalTrades').innerHTML = total;
            document.getElementById('buyCeCount').innerHTML = buyCe;
            document.getElementById('buyPeCount').innerHTML = buyPe;
            document.getElementById('lastSignal').innerHTML = lastSignal;
            
            // Update table
            const tbody = document.getElementById('tradeTableBody');
            tbody.innerHTML = '';
            
            if (trades.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8">No trades recorded yet. Trades will appear here automatically when signals are generated.</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>';
            } else {
                trades.forEach(trade => {
                    const row = tbody.insertRow();
                    row.insertCell(0).innerHTML = new Date(trade.timestamp).toLocaleString();
                    row.insertCell(1).innerHTML = trade.spot;
                    row.insertCell(2).innerHTML = trade.action;
                    row.insertCell(2).className = trade.action === 'BUY CE' ? 'buy-ce' : (trade.action === 'BUY PE' ? 'buy-pe' : 'wait');
                    row.insertCell(3).innerHTML = `Scenario ${trade.scenario}`;
                    row.insertCell(4).innerHTML = trade.bias;
                    row.insertCell(5).innerHTML = trade.entry;
                    row.insertCell(6).innerHTML = trade.target;
                    row.insertCell(7).innerHTML = trade.stopLoss;
                });
            }
            
            document.getElementById('lastUpdate').innerHTML = `Last updated: ${new Date().toLocaleTimeString()}`;
            
        } catch (err) {
            document.getElementById('tradeTableBody').innerHTML = '<tr><td colspan="8">⏳ Waiting for first trade... GitHub Action runs every 5 minutes.</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>';
        }
    }
    
    loadHistory();
    setInterval(loadHistory, 30000); // Refresh every 30 seconds
</script>
</body>
</html>
