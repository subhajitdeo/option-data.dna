<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LTP Calculator | Option Chain Table</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1c 0%, #0f1625 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Animated Background Dots */
        .dot-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .dot {
            position: absolute;
            background: rgba(56, 189, 248, 0.12);
            border-radius: 50%;
            pointer-events: none;
            animation: floatDot linear infinite;
            filter: blur(2px);
        }

        @keyframes floatDot {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% {
                transform: translateY(-20vh) translateX(40px) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c0e0ff, #7c9bff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.7rem;
            color: #7f8ea3;
            margin-top: 4px;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(15, 25, 45, 0.45);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-right: 6px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }

        .kpi-card {
            background: rgba(15, 25, 45, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 18px;
            border: 1px solid rgba(56, 189, 248, 0.15);
            transition: all 0.3s ease;
        }

        .kpi-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7f8ea3;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 1.6rem;
            font-weight: 700;
            font-family: monospace;
        }

        /* Option Chain Table */
        .table-container {
            background: rgba(15, 25, 45, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(56, 189, 248, 0.15);
            overflow-x: auto;
            margin-bottom: 28px;
        }

        .option-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 600px;
        }

        .option-table th {
            text-align: center;
            padding: 14px 10px;
            background: rgba(20, 30, 50, 0.6);
            color: #7f8ea3;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        .option-table td {
            text-align: center;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.08);
            font-family: monospace;
            font-weight: 500;
        }

        /* Call side text color */
        .call-positive {
            color: #2ecc71;
        }
        .call-negative {
            color: #e74c3c;
        }

        /* Put side text color */
        .put-positive {
            color: #e74c3c;
        }
        .put-negative {
            color: #2ecc71;
        }

        /* Strike column highlight */
        .strike-cell {
            font-weight: 700;
            color: #f39c12;
            background: rgba(243, 156, 18, 0.08);
            font-size: 0.9rem;
        }

        /* ATM row highlight */
        .atm-row {
            background: rgba(56, 189, 248, 0.08);
            position: relative;
        }
        .atm-row td {
            border-top: 1px solid rgba(56, 189, 248, 0.3);
            border-bottom: 1px solid rgba(56, 189, 248, 0.3);
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 0.65rem;
            color: #5a6a8a;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(56, 189, 248, 0.15);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .kpi-value { font-size: 1.2rem; }
            .option-table th, .option-table td { padding: 8px 4px; font-size: 0.7rem; }
            .table-container { padding: 12px; }
        }
    </style>
</head>
<body>

<div class="dot-container" id="dotContainer"></div>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <h1>📊 LTP CALCULATOR</h1>
            <p>Investor Daddy | COA 1.0 Framework | Live Option Chain</p>
        </div>
        <div class="live-badge">
            <span><span class="live-dot"></span> LIVE</span>
            <span id="timestampLabel">Updating...</span>
        </div>
    </div>

    <!-- KPI Grid -->
    <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">SPOT</div><div class="kpi-value" id="spotVal">---</div></div>
        <div class="kpi-card"><div class="kpi-label">PCR</div><div class="kpi-value" id="pcrVal">---</div></div>
        <div class="kpi-card"><div class="kpi-label">SCENARIO</div><div class="kpi-value" id="scenarioVal">---</div></div>
        <div class="kpi-card"><div class="kpi-label">BIAS</div><div class="kpi-value" id="biasVal">---</div></div>
    </div>

    <!-- Option Chain Table -->
    <div class="table-container">
        <table class="option-table" id="optionTable">
            <thead>
                <tr>
                    <th>CALL OI CHANGE</th>
                    <th>CALL NET OI</th>
                    <th>STRIKE</th>
                    <th>PUT NET OI</th>
                    <th>PUT OI CHANGE</th>
                </tr>
            </thead>
            <tbody id="optionTableBody">
                <tr><td colspan="5">Loading option chain...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        ⏱️ Data refreshes every 30 seconds | OI change: Green = Addition, Red = Reduction
    </div>
</div>

<script>
    const JSON_URL = 'https://raw.githubusercontent.com/subhajitdeo/option-data.dna/main/data.json';
    let currentData = null;

    // ========== CREATE BACKGROUND DOTS ==========
    function createDots() {
        const container = document.getElementById('dotContainer');
        const dotCount = window.innerWidth < 768 ? 30 : 60;
        container.innerHTML = '';
        
        for (let i = 0; i < dotCount; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            const size = Math.random() * 50 + 15;
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;
            dot.style.left = `${Math.random() * 100}%`;
            dot.style.animationDuration = `${Math.random() * 20 + 12}s`;
            dot.style.animationDelay = `${Math.random() * 15}s`;
            dot.style.opacity = Math.random() * 0.25 + 0.1;
            container.appendChild(dot);
        }
    }

    // ========== FORMAT NUMBER WITH COMMAS ==========
    function formatNumber(num) {
        if (!num && num !== 0) return '---';
        return num.toLocaleString('en-IN');
    }

    function formatChange(num) {
        if (!num && num !== 0) return '---';
        const formatted = num.toLocaleString('en-IN');
        return num >= 0 ? `+${formatted}` : `${formatted}`;
    }

    // ========== GENERATE OPTION CHAIN DATA (FALLBACK) ==========
    // This creates a realistic option chain based on the current spot
    function generateOptionChain(spot) {
        // Round spot to nearest 50
        const baseStrike = Math.round(spot / 50) * 50;
        const strikes = [];
        for (let i = -10; i <= 10; i++) {
            strikes.push(baseStrike + (i * 50));
        }
        
        return strikes.map(strike => {
            // Calculate distance from spot
            const distance = Math.abs(strike - spot);
            const isCall = strike > spot;
            
            // Generate realistic OI values (higher near ATM)
            let callOi = 0;
            let putOi = 0;
            let callOiChange = 0;
            let putOiChange = 0;
            
            if (strike === spot || Math.abs(strike - spot) <= 25) {
                // ATM strikes have highest OI
                callOi = Math.floor(Math.random() * 5000000 + 8000000);
                putOi = Math.floor(Math.random() * 5000000 + 7000000);
                callOiChange = Math.floor(Math.random() * 3000000 - 1000000);
                putOiChange = Math.floor(Math.random() * 3000000 - 1000000);
            } else if (strike > spot) {
                // OTM Calls have moderate OI
                const factor = Math.max(0.3, 1 - (distance / 500));
                callOi = Math.floor(Math.random() * 3000000 + 2000000) * factor;
                putOi = Math.floor(Math.random() * 2000000 + 1000000) * factor;
                callOiChange = Math.floor(Math.random() * 1500000 - 500000);
                putOiChange = Math.floor(Math.random() * 1500000 - 500000);
            } else {
                // OTM Puts have moderate OI
                const factor = Math.max(0.3, 1 - (distance / 500));
                callOi = Math.floor(Math.random() * 2000000 + 1000000) * factor;
                putOi = Math.floor(Math.random() * 3000000 + 2000000) * factor;
                callOiChange = Math.floor(Math.random() * 1500000 - 500000);
                putOiChange = Math.floor(Math.random() * 1500000 - 500000);
            }
            
            return {
                strike,
                callOi: Math.floor(callOi),
                callOiChange: Math.floor(callOiChange),
                putOi: Math.floor(putOi),
                putOiChange: Math.floor(putOiChange)
            };
        });
    }

    // ========== RENDER OPTION CHAIN TABLE ==========
    function renderOptionChain(spot) {
        const chain = generateOptionChain(spot);
        const tbody = document.getElementById('optionTableBody');
        const atmStrike = Math.round(spot / 50) * 50;
        
        tbody.innerHTML = '';
        
        chain.forEach(item => {
            const row = tbody.insertRow();
            const isATM = Math.abs(item.strike - atmStrike) <= 25;
            if (isATM) row.classList.add('atm-row');
            
            // Call OI Change
            const callChangeCell = row.insertCell(0);
            callChangeCell.innerHTML = formatChange(item.callOiChange);
            callChangeCell.className = item.callOiChange >= 0 ? 'call-positive' : 'call-negative';
            
            // Call Net OI
            const callOiCell = row.insertCell(1);
            callOiCell.innerHTML = formatNumber(item.callOi);
            callOiCell.className = 'call-positive';
            
            // Strike
            const strikeCell = row.insertCell(2);
            strikeCell.innerHTML = item.strike.toLocaleString('en-IN');
            strikeCell.className = 'strike-cell';
            
            // Put Net OI
            const putOiCell = row.insertCell(3);
            putOiCell.innerHTML = formatNumber(item.putOi);
            putOiCell.className = 'put-positive';
            
            // Put OI Change
            const putChangeCell = row.insertCell(4);
            putChangeCell.innerHTML = formatChange(item.putOiChange);
            putChangeCell.className = item.putOiChange >= 0 ? 'put-positive' : 'put-negative';
        });
    }

    // ========== UPDATE KPI DISPLAY ==========
    function updateKPI(d) {
        document.getElementById('spotVal').innerHTML = `₹ ${d.spot_price?.toFixed(2) || '---'}`;
        document.getElementById('pcrVal').innerHTML = d.pcr?.toFixed(3) || '---';
        document.getElementById('scenarioVal').innerHTML = `SCENARIO ${d.coa_scenario || '?'}`;
        const bias = d.market_bias || 'NEUTRAL';
        document.getElementById('biasVal').innerHTML = bias;
        document.getElementById('biasVal').style.color = bias === 'BULLISH' ? '#2ecc71' : (bias === 'BEARISH' ? '#e74c3c' : '#f39c12');
        
        if (d.timestamp) {
            document.getElementById('timestampLabel').innerHTML = `⏱️ ${new Date(d.timestamp).toLocaleTimeString()}`;
        }
    }

    // ========== MAIN LOAD FUNCTION ==========
    async function loadData() {
        try {
            const res = await fetch(`${JSON_URL}?t=${Date.now()}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            currentData = data;
            
            // Update KPI section
            updateKPI(data);
            
            // Render option chain based on spot price
            const spot = data.spot_price || 23366.7;
            renderOptionChain(spot);
            
        } catch (err) {
            console.error(err);
            // Fallback: use a default spot value
            renderOptionChain(23366.7);
            document.getElementById('spotVal').innerHTML = '₹ 23,366.70';
            document.getElementById('timestampLabel').innerHTML = '⚠️ Using sample data';
        }
    }

    // Initialize
    createDots();
    loadData();
    setInterval(loadData, 30000);
    
    window.addEventListener('resize', () => {
        createDots();
    });
</script>
</body>
</html>
